<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Flowmodoro</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --surface: #fffefa;
      --ink: #20201e;
      --muted: #6f6a61;
      --line: #ddd7c9;
      --accent: #2f756b;
      --accent-ink: #ffffff;
      --warn: #b95036;
      --focus: rgba(47, 117, 107, 0.22);
      --shadow: 0 18px 50px rgba(32, 32, 30, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        linear-gradient(180deg, rgba(255, 254, 250, 0.82), rgba(247, 245, 239, 0.94)),
        repeating-linear-gradient(90deg, rgba(47, 117, 107, 0.035) 0 1px, transparent 1px 84px);
      color: var(--ink);
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .app {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 40px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 18px 0 26px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background:
        conic-gradient(from 90deg, var(--accent) 0 270deg, transparent 270deg),
        var(--surface);
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 8px var(--surface);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 3.1rem);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .today {
      color: var(--muted);
      font-size: 0.94rem;
      text-align: right;
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 0.95fr) minmax(340px, 1.05fr);
      gap: 28px;
      align-items: start;
    }

    .timer-panel,
    .report-panel {
      background: rgba(255, 254, 250, 0.78);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .timer-panel {
      padding: 26px;
      display: grid;
      gap: 24px;
    }

    .field {
      display: grid;
      gap: 10px;
    }

    label {
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 650;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      outline: none;
    }

    input {
      min-height: 46px;
      padding: 0 12px;
    }

    textarea {
      min-height: 102px;
      resize: vertical;
      padding: 14px;
      line-height: 1.45;
    }

    input:focus,
    textarea:focus,
    .tabs button:focus-visible,
    .icon-button:focus-visible,
    .primary:focus-visible,
    .secondary:focus-visible,
    .danger:focus-visible {
      box-shadow: 0 0 0 4px var(--focus);
      outline: none;
    }

    .settings {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 112px;
      gap: 14px;
      align-items: end;
    }

    .automation {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 254, 250, 0.58);
    }

    .toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      font-size: 0.94rem;
      font-weight: 560;
      text-transform: none;
      letter-spacing: 0;
    }

    .toggle input {
      width: 18px;
      min-height: 18px;
      flex: 0 0 auto;
      accent-color: var(--accent);
    }

    .hint {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    .display {
      display: grid;
      gap: 8px;
      padding: 22px 0 6px;
    }

    .time {
      font-variant-numeric: tabular-nums;
      font-size: clamp(3.2rem, 13vw, 6.8rem);
      line-height: 0.9;
      font-weight: 760;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .status {
      color: var(--muted);
      min-height: 24px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .primary,
    .secondary,
    .danger,
    .icon-button {
      min-height: 48px;
      border-radius: 8px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: transform 140ms ease, background-color 140ms ease;
    }

    .primary:hover:not(:disabled),
    .secondary:hover:not(:disabled),
    .danger:hover:not(:disabled),
    .icon-button:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .primary {
      background: var(--accent);
      color: var(--accent-ink);
      font-weight: 720;
    }

    .secondary {
      background: #e9e4d7;
      color: var(--ink);
      font-weight: 720;
    }

    .danger {
      background: #f2ded7;
      color: var(--warn);
      font-weight: 720;
    }

    .break-panel {
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f3efe4;
    }

    .break-panel[hidden] {
      display: none;
    }

    .break-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .break-title strong {
      color: var(--ink);
      font-size: 1.2rem;
      font-variant-numeric: tabular-nums;
    }

    .break-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .icon-button {
      width: 48px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .mini-stat {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .report-panel {
      overflow: hidden;
    }

    .report-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 22px 22px 16px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      margin: 0;
      font-size: 1.12rem;
      letter-spacing: 0;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f3efe4;
      min-width: 220px;
    }

    .tabs button {
      min-height: 34px;
      border-radius: 6px;
      color: var(--muted);
      background: transparent;
      font-size: 0.9rem;
      font-weight: 680;
    }

    .tabs button[aria-selected="true"] {
      background: var(--surface);
      color: var(--ink);
      box-shadow: 0 1px 6px rgba(32, 32, 30, 0.08);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-bottom: 1px solid var(--line);
    }

    .summary div {
      padding: 18px 22px;
      border-right: 1px solid var(--line);
    }

    .summary div:last-child {
      border-right: 0;
    }

    .summary strong {
      display: block;
      font-size: 1.45rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      margin-bottom: 8px;
    }

    .summary span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .sessions {
      min-height: 370px;
      max-height: 56vh;
      overflow: auto;
    }

    .session {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      padding: 16px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 254, 250, 0.58);
    }

    .session:last-child {
      border-bottom: 0;
    }

    .session-title {
      margin: 0 0 7px;
      font-weight: 720;
      overflow-wrap: anywhere;
    }

    .session-meta {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .session-time {
      font-variant-numeric: tabular-nums;
      font-weight: 760;
      color: var(--accent);
      white-space: nowrap;
    }

    .empty {
      min-height: 370px;
      display: grid;
      place-items: center;
      color: var(--muted);
      padding: 32px;
      text-align: center;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 860px) {
      .app {
        width: min(100% - 24px, 680px);
        padding-top: 16px;
      }

      header {
        align-items: flex-start;
        padding-bottom: 18px;
      }

      main {
        grid-template-columns: 1fr;
      }

      .today {
        font-size: 0.84rem;
      }
    }

    @media (max-width: 560px) {
      header,
      .report-head {
        flex-direction: column;
        align-items: stretch;
      }

      .today {
        text-align: left;
      }

      .timer-panel {
        padding: 18px;
      }

      .actions,
      .break-actions,
      .summary {
        grid-template-columns: 1fr;
      }

      .settings {
        grid-template-columns: 1fr;
      }

      .summary div {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .summary div:last-child {
        border-bottom: 0;
      }

      .tabs {
        min-width: 0;
      }

      .session {
        grid-template-columns: 1fr;
      }

      .session-time {
        justify-self: start;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="mark" aria-hidden="true"></div>
        <h1>Flowmodoro</h1>
      </div>
      <div class="today" id="todayLabel"></div>
    </header>

    <main>
      <section class="timer-panel" aria-labelledby="timerTitle">
        <div>
          <h2 id="timerTitle">Focus timer</h2>
        </div>

        <div class="field">
          <label for="taskInput">Task</label>
          <textarea id="taskInput" placeholder="Write the task you are about to work on"></textarea>
        </div>

        <div class="settings">
          <div class="hint">Break is calculated from your last focus session.</div>
          <div class="field">
            <label for="breakDivider">Divide by</label>
            <input id="breakDivider" type="number" min="2" max="12" step="1" value="5" aria-label="Break divider">
          </div>
        </div>

        <div class="automation" aria-label="Automation settings">
          <label class="toggle" for="autoBreak">
            <input id="autoBreak" type="checkbox">
            <span>Auto-start break after focus</span>
          </label>
          <label class="toggle" for="autoFocus">
            <input id="autoFocus" type="checkbox">
            <span>Auto-start focus after break</span>
          </label>
          <label class="toggle" for="soundNotify">
            <input id="soundNotify" type="checkbox">
            <span>Sound when break ends</span>
          </label>
        </div>

        <div class="display" aria-live="polite">
          <div class="time" id="timerDisplay">00:00:00</div>
          <div class="status" id="statusText">Ready when you are.</div>
        </div>

        <div class="break-panel" id="breakPanel" hidden>
          <div class="break-title">
            <span>Next break</span>
            <strong id="breakText">00:00:00</strong>
          </div>
          <div class="break-actions">
            <button class="secondary" id="startBreakBtn" type="button">
              <span aria-hidden="true">▶</span>
              <span>Start break</span>
            </button>
            <button class="icon-button" id="skipBreakBtn" type="button" title="Skip break" aria-label="Skip break">↷</button>
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="startBtn" type="button">
            <span aria-hidden="true">▶</span>
            <span>Start</span>
          </button>
          <button class="danger" id="stopBtn" type="button" disabled>
            <span aria-hidden="true">■</span>
            <span>Stop</span>
          </button>
        </div>

        <div class="toolbar">
          <div class="mini-stat" id="totalToday">Today: 0m</div>
          <button class="icon-button" id="clearBtn" type="button" title="Clear all reports" aria-label="Clear all reports">⌫</button>
        </div>
      </section>

      <section class="report-panel" aria-labelledby="reportTitle">
        <div class="report-head">
          <h2 id="reportTitle">Reports</h2>
          <div class="tabs" role="tablist" aria-label="Report period">
            <button type="button" role="tab" aria-selected="true" data-period="daily">Daily</button>
            <button type="button" role="tab" aria-selected="false" data-period="weekly">Weekly</button>
            <button type="button" role="tab" aria-selected="false" data-period="monthly">Monthly</button>
          </div>
        </div>

        <div class="summary" aria-label="Report summary">
          <div>
            <strong id="summaryTime">0m</strong>
            <span>Total focus</span>
          </div>
          <div>
            <strong id="summarySessions">0</strong>
            <span>Sessions</span>
          </div>
          <div>
            <strong id="summaryAverage">0m</strong>
            <span>Average</span>
          </div>
        </div>

        <div class="sessions" id="sessionList"></div>
      </section>
    </main>
  </div>

  <script>
    const storageKey = "flowmodoro.sessions.v1";
    const settingsKey = "flowmodoro.settings.v1";
    const els = {
      todayLabel: document.querySelector("#todayLabel"),
      taskInput: document.querySelector("#taskInput"),
      breakDivider: document.querySelector("#breakDivider"),
      autoBreak: document.querySelector("#autoBreak"),
      autoFocus: document.querySelector("#autoFocus"),
      soundNotify: document.querySelector("#soundNotify"),
      timerDisplay: document.querySelector("#timerDisplay"),
      statusText: document.querySelector("#statusText"),
      breakPanel: document.querySelector("#breakPanel"),
      breakText: document.querySelector("#breakText"),
      startBreakBtn: document.querySelector("#startBreakBtn"),
      skipBreakBtn: document.querySelector("#skipBreakBtn"),
      startBtn: document.querySelector("#startBtn"),
      stopBtn: document.querySelector("#stopBtn"),
      clearBtn: document.querySelector("#clearBtn"),
      totalToday: document.querySelector("#totalToday"),
      tabs: document.querySelectorAll("[data-period]"),
      summaryTime: document.querySelector("#summaryTime"),
      summarySessions: document.querySelector("#summarySessions"),
      summaryAverage: document.querySelector("#summaryAverage"),
      sessionList: document.querySelector("#sessionList")
    };

    let sessions = loadSessions();
    let settings = loadSettings();
    let activePeriod = "daily";
    let mode = "idle";
    let startedAt = null;
    let breakEndsAt = null;
    let pendingBreakMs = 0;
    let tickId = null;

    els.todayLabel.textContent = new Intl.DateTimeFormat(undefined, {
      weekday: "long",
      month: "short",
      day: "numeric",
      year: "numeric"
    }).format(new Date());

    function loadSessions() {
      try {
        const data = JSON.parse(localStorage.getItem(storageKey) || "[]");
        return Array.isArray(data) ? data : [];
      } catch {
        return [];
      }
    }

    function saveSessions() {
      localStorage.setItem(storageKey, JSON.stringify(sessions));
    }

    function loadSettings() {
      try {
        const data = JSON.parse(localStorage.getItem(settingsKey) || "{}");
        return {
          breakDivider: clampDivider(data.breakDivider || 5),
          autoBreak: Boolean(data.autoBreak),
          autoFocus: Boolean(data.autoFocus),
          soundNotify: data.soundNotify !== false
        };
      } catch {
        return { breakDivider: 5, autoBreak: false, autoFocus: false, soundNotify: true };
      }
    }

    function saveSettings() {
      localStorage.setItem(settingsKey, JSON.stringify(settings));
    }

    function clampDivider(value) {
      const parsed = Number.parseInt(value, 10);
      if (Number.isNaN(parsed)) return 5;
      return Math.min(12, Math.max(2, parsed));
    }

    function pad(value) {
      return String(value).padStart(2, "0");
    }

    function formatClock(ms, roundUp = false) {
      const total = Math.max(0, roundUp ? Math.ceil(ms / 1000) : Math.floor(ms / 1000));
      const hours = Math.floor(total / 3600);
      const minutes = Math.floor((total % 3600) / 60);
      const seconds = total % 60;
      return `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;
    }

    function formatDuration(ms) {
      const minutes = Math.round(ms / 60000);
      if (ms <= 0) return "0m";
      if (minutes < 1) return "<1m";
      const hours = Math.floor(minutes / 60);
      const rest = minutes % 60;
      if (!hours) return `${minutes}m`;
      return rest ? `${hours}h ${rest}m` : `${hours}h`;
    }

    function sameDay(a, b) {
      return a.getFullYear() === b.getFullYear() &&
        a.getMonth() === b.getMonth() &&
        a.getDate() === b.getDate();
    }

    function startOfWeek(date) {
      const copy = new Date(date);
      const day = (copy.getDay() + 6) % 7;
      copy.setHours(0, 0, 0, 0);
      copy.setDate(copy.getDate() - day);
      return copy;
    }

    function inPeriod(session, period) {
      const start = new Date(session.startedAt);
      const now = new Date();
      if (period === "daily") return sameDay(start, now);
      if (period === "weekly") {
        const weekStart = startOfWeek(now);
        const weekEnd = new Date(weekStart);
        weekEnd.setDate(weekEnd.getDate() + 7);
        return start >= weekStart && start < weekEnd;
      }
      return start.getFullYear() === now.getFullYear() && start.getMonth() === now.getMonth();
    }

    function render() {
      const filtered = sessions
        .filter((session) => inPeriod(session, activePeriod))
        .sort((a, b) => new Date(b.endedAt) - new Date(a.endedAt));
      const total = filtered.reduce((sum, session) => sum + session.durationMs, 0);
      const average = filtered.length ? total / filtered.length : 0;

      els.summaryTime.textContent = formatDuration(total);
      els.summarySessions.textContent = filtered.length;
      els.summaryAverage.textContent = formatDuration(average);

      const todayTotal = sessions
        .filter((session) => inPeriod(session, "daily"))
        .reduce((sum, session) => sum + session.durationMs, 0);
      els.totalToday.textContent = `Today: ${formatDuration(todayTotal)}`;

      if (!filtered.length) {
        els.sessionList.innerHTML = '<div class="empty">Completed sessions will appear here.</div>';
        return;
      }

      els.sessionList.innerHTML = filtered.map((session) => {
        const start = new Date(session.startedAt);
        const end = new Date(session.endedAt);
        const date = new Intl.DateTimeFormat(undefined, {
          month: "short",
          day: "numeric"
        }).format(start);
        const time = `${start.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })} - ${end.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}`;
        return `
          <article class="session">
            <div>
              <p class="session-title">${escapeHtml(session.task)}</p>
              <div class="session-meta">${date} · ${time} · Break ${formatDuration(session.breakMs || 0)} ÷${session.breakDivider || settings.breakDivider}</div>
            </div>
            <div class="session-time">${formatDuration(session.durationMs)}</div>
          </article>
        `;
      }).join("");
    }

    function escapeHtml(value) {
      return value
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function updateTick() {
      if (mode === "focus" && startedAt) {
        els.timerDisplay.textContent = formatClock(Date.now() - startedAt);
        return;
      }

      if (mode === "break" && breakEndsAt) {
        const remaining = breakEndsAt - Date.now();
        els.timerDisplay.textContent = formatClock(remaining, true);
        if (remaining <= 0) completeBreak();
      }
    }

    function setMode(nextMode) {
      mode = nextMode;
      const isFocus = mode === "focus";
      const isBreak = mode === "break";
      els.taskInput.disabled = isFocus || isBreak;
      els.breakDivider.disabled = isFocus || isBreak;
      els.autoBreak.disabled = isFocus || isBreak;
      els.autoFocus.disabled = isFocus || isBreak;
      els.soundNotify.disabled = isFocus || isBreak;
      els.startBtn.disabled = isFocus || isBreak;
      els.stopBtn.disabled = !isFocus;
      els.startBreakBtn.disabled = isBreak;
      els.skipBreakBtn.disabled = isBreak;

      if (isFocus) {
        els.statusText.textContent = "In flow.";
      } else if (isBreak) {
        els.statusText.textContent = "Break time.";
      } else {
        els.statusText.textContent = pendingBreakMs ? "Break is ready." : "Ready when you are.";
      }
    }

    function showBreak(ms) {
      pendingBreakMs = Math.max(0, Math.round(ms));
      els.breakText.textContent = formatClock(pendingBreakMs, true);
      els.breakPanel.hidden = pendingBreakMs <= 0;
    }

    function clearBreak() {
      pendingBreakMs = 0;
      breakEndsAt = null;
      els.breakPanel.hidden = true;
      els.breakText.textContent = "00:00:00";
      if (tickId) window.clearInterval(tickId);
      tickId = null;
    }

    function completeBreak() {
      clearBreak();
      els.timerDisplay.textContent = "00:00:00";
      setMode("idle");
      els.statusText.textContent = "Break finished.";
      playBreakSound();
      if (settings.autoFocus && els.taskInput.value.trim()) {
        startFocus();
      }
    }

    function playBreakSound() {
      if (!settings.soundNotify) return;
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;

      try {
        const audio = new AudioContext();
        const now = audio.currentTime;
        const notes = [660, 880, 990];
        notes.forEach((frequency, index) => {
          const start = now + index * 0.13;
          const oscillator = audio.createOscillator();
          const gain = audio.createGain();
          oscillator.type = "sine";
          oscillator.frequency.setValueAtTime(frequency, start);
          gain.gain.setValueAtTime(0.0001, start);
          gain.gain.exponentialRampToValueAtTime(0.12, start + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.18);
          oscillator.connect(gain).connect(audio.destination);
          oscillator.start(start);
          oscillator.stop(start + 0.2);
        });
        window.setTimeout(() => audio.close(), 700);
      } catch {
        // Browsers may block sound until the user interacts with the page.
      }
    }

    function startFocus() {
      const task = els.taskInput.value.trim();
      if (!task) {
        els.statusText.textContent = "Write a task before starting.";
        els.taskInput.focus();
        return false;
      }

      clearBreak();
      startedAt = Date.now();
      els.timerDisplay.textContent = "00:00:00";
      tickId = window.setInterval(updateTick, 250);
      updateTick();
      setMode("focus");
      return true;
    }

    els.startBtn.addEventListener("click", () => {
      startFocus();
    });

    els.stopBtn.addEventListener("click", () => {
      if (mode !== "focus" || !startedAt) return;
      window.clearInterval(tickId);
      const endedAt = Date.now();
      const durationMs = endedAt - startedAt;
      const breakDivider = clampDivider(els.breakDivider.value);
      const breakMs = Math.round(durationMs / breakDivider);
      sessions.push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(endedAt),
        task: els.taskInput.value.trim(),
        startedAt: new Date(startedAt).toISOString(),
        endedAt: new Date(endedAt).toISOString(),
        durationMs,
        breakDivider,
        breakMs
      });
      saveSessions();
      startedAt = null;
      tickId = null;
      if (!settings.autoFocus) {
        els.taskInput.value = "";
      }
      els.timerDisplay.textContent = "00:00:00";
      showBreak(breakMs);
      setMode("idle");
      render();
      if (settings.autoBreak && pendingBreakMs) {
        startBreak();
      }
    });

    function startBreak() {
      if (!pendingBreakMs) return;
      breakEndsAt = Date.now() + pendingBreakMs;
      tickId = window.setInterval(updateTick, 250);
      updateTick();
      setMode("break");
    }

    els.startBreakBtn.addEventListener("click", () => {
      startBreak();
    });

    els.skipBreakBtn.addEventListener("click", () => {
      clearBreak();
      els.timerDisplay.textContent = "00:00:00";
      setMode("idle");
    });

    els.breakDivider.addEventListener("change", () => {
      settings.breakDivider = clampDivider(els.breakDivider.value);
      els.breakDivider.value = settings.breakDivider;
      saveSettings();
    });

    els.autoBreak.addEventListener("change", () => {
      settings.autoBreak = els.autoBreak.checked;
      saveSettings();
    });

    els.autoFocus.addEventListener("change", () => {
      settings.autoFocus = els.autoFocus.checked;
      saveSettings();
    });

    els.soundNotify.addEventListener("change", () => {
      settings.soundNotify = els.soundNotify.checked;
      saveSettings();
    });

    els.tabs.forEach((button) => {
      button.addEventListener("click", () => {
        activePeriod = button.dataset.period;
        els.tabs.forEach((tab) => tab.setAttribute("aria-selected", String(tab === button)));
        render();
      });
    });

    els.clearBtn.addEventListener("click", () => {
      if (!sessions.length) return;
      const ok = window.confirm("Clear all saved flowmodoro reports?");
      if (!ok) return;
      sessions = [];
      saveSessions();
      render();
    });

    els.breakDivider.value = settings.breakDivider;
    els.autoBreak.checked = settings.autoBreak;
    els.autoFocus.checked = settings.autoFocus;
    els.soundNotify.checked = settings.soundNotify;
    render();
  </script>
</body>
</html>
